name: Public Safe Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  public-safe-validate:
    name: Run public-safe repository validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run validate_repo.sh
        id: validate
        shell: bash
        run: |
          set -o pipefail
          echo "== public-safe validation start =="
          set +e
          bash validate_repo.sh 2>&1 | tee public-safe-validate.log
          status=${PIPESTATUS[0]}
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [[ $status -eq 0 ]]; then
            echo "== public-safe validation PASS =="
          else
            echo "== public-safe validation FAIL =="
            {
              echo "<!-- public-safe-validation-comment -->"
              echo "## Public-safe validation failed"
              echo
              echo "The repository public-safe guardrail found concrete private/sensitive values in this PR."
              echo
              echo "### Hit rules / risk lines"
              echo '```text'
              grep -E '(^MISS |^FAIL |^[^:]+:[0-9]+:)' public-safe-validate.log | head -80 || true
              echo '```'
              echo
              echo "### How to fix"
              echo "Replace real tokens, private local paths, internal Feishu/OpenClaw IDs, and live workspace identifiers with placeholder/mock/example values before publishing."
            } > public-safe-comment.md
          fi

      - name: Comment public-safe validation risks on PR
        if: ${{ github.event_name == 'pull_request' && steps.validate.outputs.status != '0' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- public-safe-validation-comment -->';
            const body = fs.readFileSync('public-safe-comment.md', 'utf8');
            const {owner, repo} = context.repo;
            const issue_number = context.issue.number;
            const {data: comments} = await github.rest.issues.listComments({owner, repo, issue_number, per_page: 100});
            const existing = comments.find(comment => comment.user?.type === 'Bot' && comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
            } else {
              await github.rest.issues.createComment({owner, repo, issue_number, body});
            }

      - name: Fail on public-safe validation errors
        if: ${{ steps.validate.outputs.status != '0' }}
        shell: bash
        run: exit "${{ steps.validate.outputs.status }}"
