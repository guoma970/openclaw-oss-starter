version: 1
default_executor: media
channel: feishu
root_policy:
  description: "Current OpenClaw knowledge-base pages live directly under the project root wiki node."
  allow_root_publish: true
directories:
  project_status:
    label: "项目总览"
    route_type: section
    target_node: "<FEISHU_PARENT_NODE_TOKEN>"
    applies_to:
      - "project_overview"
    rule: "Project positioning, public skill scope, release status, and repository overview pages go here."
  publishing_assets:
    label: "对外发布"
    route_type: section
    target_node: "<FEISHU_PARENT_NODE_TOKEN>"
    applies_to:
      - "publishing_copy"
    rule: "Launch copy, channel-adapted announcements, and external publishing reference pages go here."
  application_assets:
    label: "申请与介绍"
    route_type: section
    target_node: "<FEISHU_PARENT_NODE_TOKEN>"
    applies_to:
      - "application_materials"
    rule: "Application answers, project descriptions, and reusable intro materials go here."
routing_rules:
  - "Resolve the page key first, then map it to one configured directory."
  - "Create or update inside the matched directory target_node."
  - "Do not create new top-level categories without an explicit rule."
  - "If a page key has no matching directory, stop and ask for routing."
