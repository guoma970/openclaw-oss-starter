default_project: openclaw-oss-starter

projects:
  - key: openclaw-oss-starter
    title: OpenClaw OSS Starter
    local_path: /Users/<your-user>/Documents/Projects/openclaw-oss-starter
    github_repo: guoma970/openclaw-oss-starter
    sensitivity: public
    public_sync:
      github: true
      clawhub: true
      feishu_kb: true

  - key: yanding-cockpit
    title: Example Internal Dashboard
    local_path: /Users/<your-user>/Documents/Projects/yanding-cockpit
    github_repo: ""
    sensitivity: internal
    public_sync:
      github: false
      clawhub: false
      feishu_kb: false

  - key: xiguo-companion
    title: Example Companion Project
    local_path: /Users/<your-user>/Documents/Projects/xiguo-companion
    github_repo: ""
    sensitivity: commercial_sensitive
    public_sync:
      github: false
      clawhub: false
      feishu_kb: false
